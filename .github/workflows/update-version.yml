name: Update version

# Runs after every push to main that isn't the version-bump commit itself.
# Updates APP_COMMIT in js/constants.js to the short SHA of the triggering
# commit, then pushes a follow-up commit tagged [skip ci] so the workflow
# doesn't loop.

on:
  push:
    branches: [main]

jobs:
  update-version:
    runs-on: ubuntu-latest
    # Skip the bot's own version-bump commit to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the full commit so git push works without detached HEAD issues
          ref: main

      - name: Update APP_COMMIT in constants.js
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          sed -i "s/const APP_COMMIT = '[^']*';/const APP_COMMIT = '$SHORT_SHA';/" js/constants.js
          echo "Set APP_COMMIT to $SHORT_SHA"
          grep "APP_COMMIT" js/constants.js

      - name: Commit and push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/constants.js
          # Only commit if there's actually a change (idempotent)
          git diff --staged --quiet && echo "No change needed" && exit 0
          git commit -m "chore: update APP_COMMIT to ${GITHUB_SHA::7} [skip ci]"
          git push
